{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Django Public Blog - новая публикация</title>
    <link rel="stylesheet" href="{% static 'css/archive.css' %}">
</head>
<body>
    <div class="header">
        <a href="{% url 'archive' %}"><img src="{% static 'img/dpb-logo.png' %}" /></a>
    </div>
    <div class="archive">
        <a href="{% url 'archive' %}" class="return-link">&larr; Вернуться к записям</a>
        <div class="form-section">
            <h2>Новая запись в блоге</h2>
            <form method="POST">{% csrf_token %}
                <input type="text" name="title" placeholder="Название статьи" value="{{ form.title }}">
                <textarea name="text" placeholder="Текст статьи">{{ form.text }}</textarea>
                <input type="submit" value="Разместить запись">
            </form>
            {% if form.errors %}
            <div class="field-errors">{{ form.errors }}</div>
            {% endif %}
        </div>
    </div>
</body>
</html>
